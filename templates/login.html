{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
        <div class="container mt-5">
        <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card glass-card p-5">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
                <h2 class="text-center">Login here</h2>
                <form action="{% url 'login' %}" method="POST"  >
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" id="exampleInputUsername1">
                        
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="exampleInputPassword1">
                    </div>

                    <div class="text-center mt-3">
                    <button type="submit" class="btn btn-glass">Login</button>
                    </div>
                    </form>

                    <div class="text-center mt-3">
                    <small>
                        Don't have an account? <a href="{% url 'signup' %}" class="text-decoration-none fw-bold">Sign up</a>
                    </small>
                    </div>

            </div>
        </div>
    </div> </div> 
{% endblock %}
