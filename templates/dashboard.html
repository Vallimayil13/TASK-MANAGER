{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Task Statistics</h2>
    
    <div class="row g-4">
        <!-- Total Tasks -->
        <div class="col-md-3">
            <div class="card shadow-sm border-0 bg-dark text-white">
                <div class="card-body text-center">
                    <h6 class="text-uppercase small">Total</h6>
                    <h2 class="display-5 fw-bold">{{ status.total }}</h2>
                </div>
            </div>
        </div>

        <!-- Overdue Tasks -->
        <div class="col-md-3">
            <div class="card shadow-sm  bg-danger text-white">
                <div class="card-body text-center">
                    <h6 class="text-uppercase small">Overdue</h6>
                    <h2 class="display-5 fw-bold">{{ status.overdue }}</h2>
                </div>
            </div>
        </div>

        <!-- Pending Tasks -->
        <div class="col-md-3">
            <div class="card shadow-sm  bg-warning text-dark">
                <div class="card-body text-center">
                    <h6 class="text-uppercase small">Pending</h6>
                    <h2 class="display-5 fw-bold">{{ status.pending }}</h2>
                </div>
            </div>
        </div>

        <!-- Completed Tasks -->
        <div class="col-md-3">
            <div class="card shadow-sm  bg-success text-white">
                <div class="card-body text-center">
                    <h6 class="text-uppercase small">Completed</h6>
                    <h2 class="display-5 fw-bold">{{ status.completed }}</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-5 p-4 bg-light rounded text-center">
        <h4>Ready to manage your day?</h4>
        <a href="{% url 'task_list' %}" class="btn btn-outline-dark px-4 mt-2">View Task List</a>
    </div>
</div>
{% endblock %}
