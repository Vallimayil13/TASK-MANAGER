{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    body {
        
        background: url("{% static 'images/bg.jpg' %}") no-repeat center center fixed !important;
        background-size: cover !important;
        min-height: 100vh;
    }

    
    .glass-delete-card {
        background: rgba(255, 255, 255, 0.85) !important; 
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
        border-radius: 25px !important;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    
    
    .card-body { background: transparent !important; }
</style>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card glass-delete-card shadow-lg border-0">
                <div class="card-body p-5 text-center">
                   
                    <div class="mb-4">
                        
                        <svg xmlns="http://w3.org" width="60" height="60" fill="currentColor" class="bi bi-exclamation-triangle-fill text-danger" viewBox="0 0 16 16">
                          <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
                        </svg>
                    </div>

                    <h2 class="fw-bold mb-3">Delete Task</h2>
                    <p class="text-secondary">
                        Are you sure you want to delete <br>
                        <span class="text-dark fw-bold fs-5">"{{ task.title }}"</span>? 
                    </p>
                    <p class="small text-danger mb-4 fw-bold">This action cannot be undone.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-3">
                           
                            <button type="submit" class="btn btn-danger rounded-pill py-2 fw-bold shadow-sm">
                                Yes, Delete Permanently
                            </button>
                            
                            <a href="{% url 'task_list' %}" class="text-decoration-none text-dark fw-bold small mt-2">
                                Cancel and Go Back
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
