{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/createTask.css' %}">
{% endblock %}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card glass-task-card p-4 border-0">
                <div class="card-body">
                    <h2 class="text-center mb-5">Create New Task</h2>
                    
                    <form method="post" novalidate>
                        {% csrf_token %}
                        {{ form|crispy }}

                        <div class="text-center mt-4">
                           
                            <button type="submit" class="btn btn-dark rounded-pill fw-bold py-2 px-5 me-2">
                                Save Task
                            </button>
                        </div>
     
                    </form>
                    <div class="text-center mt-3">
                            <a href="{% url 'task_list' %}" class="text-decoration-none text-dark fw-bold small">
                                Back to List
                            </a>
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
